name: Update legislators-abroad data

on:
  schedule:
    # Daily at 06:00 Asia/Taipei = 22:00 UTC
    - cron: "0 22 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run updater
        run: python scripts/update_legislators.py

      - name: Commit if changed
        run: |
          if [[ -n "$(git status --porcelain data/legislators.json)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add data/legislators.json
            git commit -m "chore(data): daily legislators-abroad sync"
            git push
          else
            echo "No changes"
          fi
