name: Update CN-defense stock data

on:
  schedule:
    # Trading days post-close: 09:00 UTC = 17:00 Asia/Shanghai
    # Run Mon-Fri only (Sat = day 6, Sun = day 0)
    - cron: "0 9 * * 1-5"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run updater
        run: python scripts/update_cn_defense.py

      - name: Commit if changed
        run: |
          if [[ -n "$(git status --porcelain data/cn_defense.json)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add data/cn_defense.json
            git commit -m "chore(data): daily CN-defense stock sync"
            git push
          else
            echo "No changes"
          fi
