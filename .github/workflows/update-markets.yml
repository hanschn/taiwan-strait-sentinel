name: Update prediction-market index

on:
  schedule:
    # Every 6 hours — odds move slowly; this only needs to keep the committed
    # fallback fresh (lib/markets.ts fetches live at request time).
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run updater
        run: python scripts/update_markets.py

      - name: Commit if changed
        run: |
          if [[ -n "$(git status --porcelain data/markets.json)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add data/markets.json
            git commit -m "chore(data): refresh prediction-market index"
            git push
          else
            echo "No changes"
          fi
